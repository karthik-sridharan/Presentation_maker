<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Lumina Stage 23B diagnostics</title><style>body{font:14px/1.45 system-ui,-apple-system,Segoe UI,sans-serif;margin:24px;background:#f8fafc;color:#0f172a}pre{background:#0f172a;color:#e2e8f0;padding:12px;border-radius:10px;overflow:auto}table{border-collapse:collapse;width:100%;background:white;border-radius:10px;overflow:hidden;box-shadow:0 1px 8px rgba(15,23,42,.08)}th,td{text-align:left;padding:8px 10px;border-bottom:1px solid #e2e8f0;font-size:13px}.ok{color:#166534;font-weight:700}.bad{color:#b91c1c;font-weight:700}button{padding:8px 11px;border:1px solid #94a3b8;border-radius:8px;background:white;cursor:pointer}</style></head><body><h1>Lumina Stage 23B diagnostics</h1><p>This page checks the renderer diagnostics cleanup introduced in stage 23B.</p><button id="copy">Copy report</button><div id="out">Checking…</div><script>const STAGE="stage23b2-20260425-1";const ASSETS=[
  "css/styles-stage23b2.css",
  "js/diagnostics-stage23b2.js",
  "js/module-manifest-stage23b2.js",
  "js/utils.js",
  "js/block-library.js",
  "js/theme.js",
  "js/presets.js",
  "js/parser.js",
  "js/block-style.js",
  "js/import.js",
  "js/state.js",
  "js/export.js",
  "js/renderer.js",
  "js/deck.js",
  "js/file-io.js",
  "js/ui.js",
  "js/figure-insert.js",
  "js/diagram-editor.js",
  "js/figure-tools.js",
  "js/editor-selection.js",
  "js/block-editor.js",
  "js/legacy-app.js",
  "js/commands.js"
];async function check(asset){const url=asset+'?v='+encodeURIComponent(STAGE)+'&diagnostic='+Date.now();try{const res=await fetch(url,{cache:'no-store'});const text=await res.text();return{asset,ok:res.ok,status:res.status,bytes:text.length,sample:text.slice(0,80)}}catch(e){return{asset,ok:false,status:'fetch-error',bytes:0,sample:String(e)}}}async function run(){const rows=await Promise.all(ASSETS.map(check));const html='<table><thead><tr><th>Status</th><th>Asset</th><th>HTTP</th><th>Bytes</th></tr></thead><tbody>'+rows.map(r=>'<tr><td class="'+(r.ok?'ok':'bad')+'">'+(r.ok?'OK':'FAIL')+'</td><td>'+r.asset+'</td><td>'+r.status+'</td><td>'+r.bytes+'</td></tr>').join('')+'</tbody></table><h2>Raw report</h2><pre>'+escapeHtml(JSON.stringify({stage:STAGE,url:location.href,rows},null,2))+'</pre>';document.getElementById('out').innerHTML=html;window.__REPORT={stage:STAGE,url:location.href,rows}}function escapeHtml(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}document.getElementById('copy').onclick=()=>navigator.clipboard.writeText(JSON.stringify(window.__REPORT||{},null,2));run();</script></body></html>
